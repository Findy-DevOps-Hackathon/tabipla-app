# main 向け: DB マイグレーション → agent → backend-api の順で Cloud Run へ自動デプロイ
# トリガー例: branch=main, included-files=services/**,packages/**
steps:
  # pnpm キャッシュ復元と Docker ビルドを並列で起動する
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: restore-cache
    waitFor: ['-']
    entrypoint: bash
    args:
      - infra/cloud-build/cache-restore.sh
    env:
      - PROJECT_ID=${PROJECT_ID}

  # キャッシュ復元後に DB マイグレーションを実行する
  - name: node:22
    id: db-migrate
    waitFor: [restore-cache]
    entrypoint: bash
    args:
      - infra/cloud-build/migrate.sh
    env:
      - PROJECT_ID=${PROJECT_ID}
      - _CLOUD_SQL_INSTANCE=${_CLOUD_SQL_INSTANCE}
    secretEnv:
      - DATABASE_URL

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: save-cache
    waitFor: [db-migrate]
    entrypoint: bash
    args:
      - infra/cloud-build/cache-save.sh
    env:
      - PROJECT_ID=${PROJECT_ID}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-agent
    waitFor: ['-']
    entrypoint: bash
    args:
      - infra/cloud-build/deploy-agent.sh
    env:
      - PROJECT_ID=${PROJECT_ID}
      - _REGION=${_REGION}
      - _ES_NODE=${_ES_NODE}
      - _ES_INDEX=${_ES_INDEX}
      - _ES_VECTOR_DIMS=${_ES_VECTOR_DIMS}

  - name: gcr.io/cloud-builders/docker
    id: build-backend
    waitFor: [deploy-agent]
    args:
      - build
      - -f
      - services/backend-api/Dockerfile
      - -t
      - gcr.io/${PROJECT_ID}/tabipla-backend-api
      - .

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    waitFor: [build-backend, save-cache]
    entrypoint: bash
    args:
      - infra/cloud-build/deploy-backend-api.sh
    env:
      - PROJECT_ID=${PROJECT_ID}
      - _REGION=${_REGION}
      - _CORS_ORIGINS=${_CORS_ORIGINS}
      - _GCS_BUCKET=${_GCS_BUCKET}
      - _GCS_PUBLIC_BASE_URL=${_GCS_PUBLIC_BASE_URL}
      - _GCS_OBJECT_PREFIX=${_GCS_OBJECT_PREFIX}
      - _ES_NODE=${_ES_NODE}
      - _ES_INDEX=${_ES_INDEX}
      - _ES_VECTOR_DIMS=${_ES_VECTOR_DIMS}
      - _EMBEDDING_PROVIDER=${_EMBEDDING_PROVIDER}

images:
  - gcr.io/${PROJECT_ID}/tabipla-backend-api

substitutions:
  _REGION: asia-northeast1
  _CLOUD_SQL_INSTANCE: tabipla-user-web:asia-northeast1:tabipla-db-tokyo
  _CORS_ORIGINS: https://tabipla-admin-web.web.app,https://tabipla-admin-web.firebaseapp.com,https://tabipla-user-web.web.app,https://tabipla-user-web.firebaseapp.com
  _GCS_BUCKET: ${PROJECT_ID}-spot-images
  _GCS_PUBLIC_BASE_URL: https://storage.googleapis.com/${PROJECT_ID}-spot-images
  _GCS_OBJECT_PREFIX: spots
  _ES_NODE: ""
  _ES_INDEX: ""
  _ES_VECTOR_DIMS: ""
  _EMBEDDING_PROVIDER: ""

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/tabipla-database-url/versions/latest
      env: DATABASE_URL

options:
  logging: CLOUD_LOGGING_ONLY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
