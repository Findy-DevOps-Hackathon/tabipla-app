# user-web / admin-web → Firebase Hosting 自動デプロイ
steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: restore-cache
    waitFor: ['-']
    entrypoint: bash
    args:
      - infra/cloud-build/cache-restore.sh
    env:
      - PROJECT_ID=${PROJECT_ID}

  - name: node:22-bookworm
    id: build-and-deploy
    waitFor: [restore-cache]
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        corepack enable
        corepack prepare pnpm@10.30.3 --activate
        pnpm config set store-dir /workspace/.pnpm-store
        pnpm install --frozen-lockfile
        bash infra/cloud-build/deploy-user-web.sh
        bash infra/cloud-build/deploy-admin-web.sh
    env:
      - PROJECT_ID=${PROJECT_ID}
      - _REGION=${_REGION}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: save-cache
    waitFor: [build-and-deploy]
    entrypoint: bash
    args:
      - infra/cloud-build/cache-save.sh
    env:
      - PROJECT_ID=${PROJECT_ID}

substitutions:
  _REGION: asia-northeast1

options:
  logging: CLOUD_LOGGING_ONLY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
