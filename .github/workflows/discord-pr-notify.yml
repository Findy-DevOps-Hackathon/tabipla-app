name: Discord PR notification

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - ready_for_review
  workflow_dispatch:

jobs:
  notify:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.action == 'ready_for_review' ||
      (github.event.action == 'opened' && github.event.pull_request.draft == false) ||
      github.event.action == 'reopened'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect PR metadata
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr view "${{ github.event.pull_request.number }}" \
            --json body,files,commits \
            > /tmp/pr-meta.json

      - name: Post to Discord
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title || 'Manual Discord notification test' }}
          PR_URL: ${{ github.event.pull_request.html_url || format('{0}/{1}/actions', github.server_url, github.repository) }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login || github.actor }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref || 'main' }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
          REPO: ${{ github.repository }}
          PR_META_JSON: /tmp/pr-meta.json
        run: |
          WEBHOOK="$(printf '%s' "$DISCORD_WEBHOOK_URL" | tr -d '[:space:]')"
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_URL is not set. Skipping Discord notification."
            exit 0
          fi

          if [[ "$WEBHOOK" != *"/api/webhooks/"* ]]; then
            echo "DISCORD_WEBHOOK_URL format is invalid."
            exit 1
          fi

          echo "Webhook URL length: ${#WEBHOOK}"

          PAYLOAD=$(python3 .github/scripts/build-discord-pr-payload.py)

          HTTP_CODE=$(curl -sS -o /tmp/discord-response.txt -w "%{http_code}" \
            -X POST "$WEBHOOK" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD")

          if [ "$HTTP_CODE" = "204" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "Discord notification sent (HTTP ${HTTP_CODE})."
            exit 0
          fi

          echo "Discord webhook failed (HTTP ${HTTP_CODE})."
          if [ -s /tmp/discord-response.txt ]; then
            cat /tmp/discord-response.txt
          fi
          exit 1
