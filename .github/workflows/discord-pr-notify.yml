name: Discord PR notification

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - ready_for_review

jobs:
  notify:
    if: >-
      github.event.action == 'ready_for_review' ||
      (github.event.action == 'opened' && github.event.pull_request.draft == false) ||
      github.event.action == 'reopened'
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
        run: |
          WEBHOOK="$(printf '%s' "$DISCORD_WEBHOOK_URL" | tr -d '[:space:]')"
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_URL is not set. Skipping Discord notification."
            exit 0
          fi

          if [[ "$WEBHOOK" != *"/api/webhooks/"* ]]; then
            echo "DISCORD_WEBHOOK_URL format is invalid."
            exit 1
          fi

          echo "Webhook URL length: ${#WEBHOOK}"

          PAYLOAD=$(python3 -c '
          import json, os
          title = os.environ["PR_TITLE"]
          if len(title) > 200:
              title = title[:197] + "..."
          message = (
              f"**PR to {os.environ[\"BASE_BRANCH\"]}:** [{title}]({os.environ[\"PR_URL\"]})\n"
              f"Author: {os.environ[\"PR_AUTHOR\"]}\n"
              f"Branch: `{os.environ[\"HEAD_BRANCH\"]}` -> `{os.environ[\"BASE_BRANCH\"]}`\n"
              f"Repository: {os.environ[\"REPO\"]}"
          )
          print(json.dumps({"content": message}, ensure_ascii=False))
          ')

          HTTP_CODE=$(curl -sS -o /tmp/discord-response.txt -w "%{http_code}" \
            -X POST "$WEBHOOK" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD")

          if [ "$HTTP_CODE" = "204" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "Discord notification sent (HTTP ${HTTP_CODE})."
            exit 0
          fi

          echo "Discord webhook failed (HTTP ${HTTP_CODE})."
          if [ -s /tmp/discord-response.txt ]; then
            cat /tmp/discord-response.txt
          fi
          exit 1

