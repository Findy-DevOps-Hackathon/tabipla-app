# モノレポルートをコンテキストに backend-api イメージをビルド
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - services/backend-api/Dockerfile
      - -t
      - ${_IMAGE}
      - .
images:
  - ${_IMAGE}
options:
  logging: CLOUD_LOGGING_ONLY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
