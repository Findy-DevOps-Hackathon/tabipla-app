# agent: Docker ビルド → Cloud Run デプロイ（GitHub トリガー / 手動 submit 用）
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - services/agent/Dockerfile
      - -t
      - ${_IMAGE}
      - .

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - infra/cloud-build/deploy-agent.sh
    env:
      - PROJECT_ID=${PROJECT_ID}
      - _REGION=${_REGION}
      - _SERVICE=${_SERVICE}
      - _IMAGE=${_IMAGE}
      - _ES_NODE=${_ES_NODE}
      - _ES_INDEX=${_ES_INDEX}
      - _ES_VECTOR_DIMS=${_ES_VECTOR_DIMS}

images:
  - ${_IMAGE}

substitutions:
  _REGION: asia-northeast1
  _SERVICE: tabipla-agent
  _IMAGE: gcr.io/${PROJECT_ID}/tabipla-agent
  _ES_NODE: ""

options:
  logging: CLOUD_LOGGING_ONLY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
